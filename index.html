<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKVI - TM4C123 Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
</head>
<body>
    <div class="header">
        <h1>🔧 WORKVI for TM4C123</h1>
        <div class="header-buttons">
            <button id="saveBtn">💾 Save</button>
            <button id="shareBtn">🔗 Share</button>
            <button id="runBtn">▶️ Run</button>
            <button id="stopBtn">⏹️ Stop</button>
        </div>
    </div>

    <div class="main-container">
        <!-- الجانب الأيسر: الرسم والقطع -->
        <div class="canvas-section">
            <div class="parts-palette">
                <div class="part" draggable="true" data-part="tm4c123">🔲 TM4C123</div>
                <div class="part" draggable="true" data-part="led">💡 LED</div>
                <div class="part" draggable="true" data-part="resistor">📦 Resistor</div>
                <div class="part" draggable="true" data-part="button">🔘 Button</div>
                <div class="part" draggable="true" data-part="gnd">⏚ GND</div>
                <div class="part" draggable="true" data-part="vcc">⚡ VCC</div>
            </div>
            <canvas id="circuitCanvas" width="600" height="400"></canvas>
            <div class="canvas-status">
                <span>🟢 Simulator Ready</span>
                <span>🔌 TM4C123GH6PM</span>
            </div>
        </div>

        <!-- الجانب الأيمن: محرر الأكواد -->
        <div class="editor-section">
            <div class="editor-tabs">
                <span class="tab active">sketch.c</span>
                <span class="tab">tm4c123.h</span>
            </div>
            <textarea id="code-editor">
#include "tm4c123.h"

int main(void) {
    // Enable clock to Port F
    SYSCTL_RCGCGPIO_R |= 0x20;
    
    // Set PF1 as output (LED)
    GPIO_PORTF_DIR_R |= 0x02;
    GPIO_PORTF_DEN_R |= 0x02;
    
    while(1) {
        // Turn LED on
        GPIO_PORTF_DATA_R |= 0x02;
        delay(1000000);
        
        // Turn LED off
        GPIO_PORTF_DATA_R &= ~0x02;
        delay(1000000);
    }
}

void delay(int count) {
    while(count--);
}
            </textarea>
        </div>
    </div>

    <!-- الجزء السفلي: الكونسول والإخراج -->
    <div class="console-section">
        <div class="console-header">
            <span>📟 Serial Monitor</span>
            <button id="clearConsole">Clear</button>
        </div>
        <div id="console-output"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    <script src="tm4c123-core.js"></script>
    <script src="canvas.js"></script>
    <script src="editor.js"></script>
    <script src="script.js"></script>
</body>
</html>
